List.remove('selected');\n    }\n\n    function showSpecificContent(index) {\n      Array.from(day1_contents).forEach(content => content.classList.remove('selected'));\n      Array.from(day2_contents).forEach(content => content.classList.remove('selected'));\n\n      if (day1_contents[index]) {\n        day1_contents[index].classList.add('selected');\n      }\n      if (day2_contents[index]) {\n        day2_contents[index].classList.add('selected');\n      }\n\n      Array.from(place_btns).forEach(btn => btn.classList.remove('selected'));\n      place_btns[index].classList.add('selected');\n    }\n\n    day1_btn.addEventListener('click', showDay1Content);\n    day2_btn.addEventListener('click', showDay2Content);\n\n    Array.from(place_btns).forEach((btn, i) => {\n      btn.addEventListener('click', () => {\n        showSpecificContent(i);\n      });\n    });\n\n    \u002F\u002F ページ読み込み時に初期状態を設定\n    \u002F\u002F 今日が2024-10-13よりも前なら1日目、それ以降なら2日目\n    const today = new Date();\n    if (today \u003C new Date('2024-10-13')) {\n      showDay1Content();\n    } else {\n      showDay2Content();\n    }\n  })();\n\u003C\u002Fscript>","adeff29f-76c9-4116-878f-44bb27d4ca8a",[253],{"memo":254,"src":255,"tags":256,"uuid":260},"Responsive Timetable CSS","\u003Cstyle>\n  #day-btns p{\n    color:rgba(255,255,255,0.3);\n  }\n  #day-btns p.selected{\n    color:#ffffff;\n  }\n  #day-btns p, #place-btns li{\n    cursor: pointer;\n  }\n  @media screen and (max-width: 840px){\n      #day1-content, #day2-content, #map {\n        display: none;\n      }\n       #day1-content.selected, #day2-content.selected  {\n        display: block;\n      }\n       #day1-inner li, #day2-inner li {\n        display: none;\n      }\n       #day1-inner li.selected, #day2-inner li.selected {\n        display: flex;\n      }\n  }\n  #place-btns li{\n    background: transparent;\n  }\n   #place-btns li p{\n     color: #ffffff;\n   }\n  #place-btns li.selected{\n    background: #ffffff;\n  }\n  #place-btns li.
